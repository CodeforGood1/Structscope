<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src {{cspSource}} 'unsafe-inline'; script-src 'nonce-{{nonce}}';">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StructScope</title>
  <link rel="stylesheet" href="{{styleUri}}">
</head>
<body>
  <header class="top-bar">
    <h1>StructScope</h1>
    <label class="control">
      <span>Platform</span>
      <select id="platform" aria-label="ABI platform">
        <option value="auto">Auto detect host</option>
        <option value="x86_64" selected>x86_64</option>
        <option value="arm64">arm64</option>
        <option value="arm32">arm32</option>
        <option value="avr">avr</option>
        <option value="riscv32">riscv32</option>
      </select>
    </label>
    <button id="detect-platform" type="button" class="secondary-button" title="Detect host ABI">Detect</button>
    <label class="control">
      <span>Cache line</span>
      <select id="cache-line" aria-label="Cache-line size">
        <option value="32">32</option>
        <option value="64" selected>64</option>
        <option value="128">128</option>
      </select>
    </label>
    <button id="copy-json" type="button" class="secondary-button" title="Copy current analysis JSON">Copy JSON</button>
    <button id="copy-report" type="button" class="secondary-button" title="Copy Markdown report">Copy Report</button>
  </header>
  <main class="workspace">
    <section class="metrics-section">
      <div id="metrics" aria-live="polite"></div>
    </section>
    <section class="map-section">
      <div id="byte-map" role="img" aria-label="Struct byte map">Waiting for analysis...</div>
    </section>
    <section class="table-section">
      <div id="field-table"></div>
    </section>
    <section class="insights-section">
      <div id="insights"></div>
    </section>
    <section class="suggestion-section">
      <div id="suggestions"></div>
    </section>
  </main>
  <script nonce="{{nonce}}" src="{{scriptUri}}"></script>
</body>
</html>
